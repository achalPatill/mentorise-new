<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Mentorise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { 50: "#f0f4ff", 500: "#3A5BA0", 600: "#2F3C7E", 700: "#1e2a4a" },
              secondary: { 50: "#fffbf0", 500: "#FFD447", 600: "#e6bf40" },
              neutral: { 50: "#F5F7FA", 100: "#e5e7eb", 200: "#d1d5db", 600: "#555555", 800: "#222222" },
            },
            fontFamily: {
              heading: ["Poppins", "Inter", "sans-serif"],
              body: ["Roboto", "Open Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  </head>
  <body class="bg-neutral-50 font-body min-h-screen">

    <nav class="bg-white shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a href="/home"><h1 class="text-2xl font-bold text-primary-500 font-heading">Mentorise</h1></a>
          <div class="hidden md:flex items-center space-x-4">
            <a href="/home" class="text-neutral-800 hover:text-primary-500 px-3 py-2 rounded-md text-sm font-medium transition-colors">Home</a>
            <a href="/signup" class="bg-primary-500 text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-primary-600 transition-all duration-300 shadow-md">Sign Up</a>
          </div>
        </div>
      </div>
    </nav>

    <section class="py-12 px-4 sm:px-6 lg:px-8">
      <div class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-neutral-100">

          <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-neutral-800 font-heading mb-2">Welcome Back</h2>
            <p class="text-neutral-600">Sign in to continue your mentorship journey</p>
          </div>

          <!-- Error message shown if login fails -->
          <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm"></div>

          <!-- Simple direct POST — no OTP -->
          <form class="space-y-6" action="/login" method="post">

            <div>
              <label for="email" class="block text-sm font-medium text-neutral-700 mb-2">Email Address</label>
              <div class="relative">
                <input type="email" id="email" name="email" required
                  class="w-full px-4 py-3 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                  placeholder="Enter your email" />
                <i class="fas fa-envelope absolute right-3 top-3.5 text-neutral-400"></i>
              </div>
            </div>

            <div>
              <label for="password" class="block text-sm font-medium text-neutral-700 mb-2">Password</label>
              <div class="relative">
                <input type="password" id="password" name="password" required
                  class="w-full px-4 py-3 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                  placeholder="Enter your password" />
                <button type="button" id="togglePassword" class="absolute right-3 top-3.5 text-neutral-400 hover:text-neutral-600">
                  <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>

            <div class="flex items-center justify-between">
              <div class="flex items-center">
                <input id="remember" name="remember" type="checkbox" class="h-4 w-4 text-primary-500 focus:ring-primary-500 border-neutral-300 rounded"/>
                <label for="remember" class="ml-2 block text-sm text-neutral-700">Remember me</label>
              </div>
            </div>

            <button type="submit"
              class="w-full bg-primary-500 text-white py-3 px-4 rounded-lg font-semibold hover:bg-primary-600 focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all duration-300 transform hover:scale-105">
              Sign In
            </button>
          </form>

          <div class="mt-8 text-center">
            <p class="text-neutral-600">
              Don't have an account?
              <a href="/signup" class="text-primary-500 hover:text-primary-600 font-medium">Sign up here</a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <script>
      document.getElementById('togglePassword').addEventListener('click', function () {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        icon.classList.toggle('fa-eye', !isPassword);
        icon.classList.toggle('fa-eye-slash', isPassword);
      });
    </script>
  </body>
</html>
